name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    # Install the Rust toolchain pinned by rust-toolchain.toml at the
    # workspace root. Without this, the workflow uses whatever Rust
    # ships preinstalled on the ubuntu-latest runner image — typically
    # several months behind what developers use locally — and rustfmt
    # output differs across Rust versions, so `cargo fmt -- --check`
    # tripped on diffs that local fmt didn't predict.
    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: "1.92.0"
        components: rustfmt, clippy
    # System libs that several transitive C-based deps need to build:
    #   - cmake               for librdkafka-sys (rdkafka, used by manta-shared::kafka)
    #   - libcurl4-openssl-dev for crates that link curl statically
    # Mirrors `[dist.dependencies.apt]` in dist-workspace.toml so the
    # CI workflow doesn't fail with cryptic "exit code 101" when those
    # build-time deps are missing on a fresh ubuntu-latest runner.
    - name: Install system build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libcurl4-openssl-dev
    - name: Build
      run: cargo build --workspace --verbose
    - name: Run tests
      run: cargo test --workspace --verbose
    - name: Check formatting
      run: cargo fmt -p manta-shared -p manta-cli -p manta-server -- --check
    - name: Run clippy
      run: cargo clippy --workspace --no-deps -- -D warnings
    # Build rustdoc. Fails on undocumented public items in
    # `manta-shared` (the crate is `#![deny(missing_docs)]`), and on
    # any broken intra-doc link or invalid HTML across the workspace.
    # This catches doc rot the same way clippy catches code rot.
    - name: Build rustdoc
      env:
        RUSTDOCFLAGS: -D rustdoc::broken_intra_doc_links -D rustdoc::invalid_html_tags
      run: cargo doc --workspace --no-deps
    # Compile and run doctests (the `# Examples` blocks inside ///
    # comments). Plain `cargo test --workspace` does NOT run these.
    - name: Run doctests
      run: cargo test --doc --workspace
    - name: Enforce anyhow boundary
      run: |
        if grep -rn 'use anyhow' \
            crates/manta-server/src/server/ \
            crates/manta-server/src/service/ \
            crates/manta-server/src/backend_dispatcher/ \
            crates/manta-server/src/manta_backend_dispatcher.rs \
            crates/manta-shared/src/common/ \
            2>/dev/null; then
          echo "ERROR: anyhow found outside crates/manta-cli/src/cli/ — only the CLI may use anyhow"
          exit 1
        fi
    # Fail on known RustSec advisories against Cargo.lock. Cheap
    # insurance against landing a CVE-flagged dep. Ignored advisories
    # are documented in `.cargo/audit.toml`.
    - name: Install cargo-audit
      run: cargo install cargo-audit --locked
    - name: Run cargo audit
      run: cargo audit
    # Fail if any crate's Cargo.toml declares a dependency it never
    # uses. Catches dep-rot when source is removed but the manifest
    # entry survives. The workspace is currently clean; any addition
    # is a regression.
    - name: Install cargo-machete
      run: cargo install cargo-machete --version 0.9.2 --locked
    - name: Run cargo machete
      run: cargo machete
    # Verify that the checked-in man pages and shell-completion scripts
    # are in sync with the current clap definition. `build.rs` only
    # regenerates them when MANTA_REGENERATE_DOCS=1 is set, so a clap
    # change that the contributor forgot to regenerate would otherwise
    # ship stale docs. Run the regen, then fail if git sees any diff.
    - name: Check generated docs are up to date
      run: |
        MANTA_REGENERATE_DOCS=1 cargo build -p manta-cli
        if ! git diff --exit-code -- crates/manta-cli/man crates/manta-cli/autocomplete_shell_scripts; then
          echo "ERROR: man pages or shell completions are out of date."
          echo "Run 'MANTA_REGENERATE_DOCS=1 cargo build -p manta-cli' and commit the diff."
          exit 1
        fi

  # Validate that both Dockerfiles still build and produce a runnable
  # binary. Runs in parallel with the cargo `build` job above (no
  # `needs:` dependency) so a Rust failure and a Docker failure both
  # surface in the same CI run instead of serialising.
  #
  # Layer caching via the GitHub Actions cache backend keeps the
  # incremental rebuild cost reasonable — without it every push would
  # re-run a full Rust workspace compile inside the image (~10 min
  # each). With it, an unchanged Dockerfile + Cargo.lock reuses every
  # layer.
  docker:
    name: docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: cli
            dockerfile: crates/manta-cli/Dockerfile
            tag: manta-cli:ci
          - image: server
            dockerfile: crates/manta-server/Dockerfile
            tag: manta-server:ci
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ matrix.tag }}
          cache-from: type=gha,scope=manta-${{ matrix.image }}
          cache-to: type=gha,scope=manta-${{ matrix.image }},mode=max
      # Smoke-test: the binary inside the image must at least produce
      # `--help` without crashing. Catches missing runtime libs
      # (librdkafka1, ca-certificates, …) that wouldn't surface from a
      # successful `cargo build` step.
      - name: Smoke-test --help
        run: docker run --rm ${{ matrix.tag }} --help
