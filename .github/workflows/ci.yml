name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Check formatting
      run: cargo fmt -- --check
    - name: Run clippy
      run: cargo clippy -- -D warnings
    - name: Enforce anyhow boundary
      run: |
        if grep -r 'use anyhow' src/server/ src/service/ src/common/ src/manta_backend_dispatcher.rs 2>/dev/null; then
          echo "ERROR: anyhow found outside src/cli/ — only src/cli/ may use anyhow"
          exit 1
        fi
