name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    # contents: write is required by the "Regenerate and commit generated
    # docs" step, which runs only on push to main and pushes the
    # regenerated man pages + shell completions back. On pull_request
    # this permission has no effect because the regen step is skipped.
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        # Need full history + a real token so the post-push step
        # below can `git push` back to main when on a push event.
        # On pull_request the default ephemeral token is fine.
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    # Install the Rust toolchain pinned by rust-toolchain.toml at the
    # workspace root. Without this, the workflow uses whatever Rust
    # ships preinstalled on the ubuntu-latest runner image — typically
    # several months behind what developers use locally — and rustfmt
    # output differs across Rust versions, so `cargo fmt -- --check`
    # tripped on diffs that local fmt didn't predict.
    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: "1.92.0"
        components: rustfmt, clippy
    # System libs that several transitive C-based deps need to build:
    #   - cmake               for librdkafka-sys (rdkafka, used by manta-shared::kafka)
    #   - libcurl4-openssl-dev for crates that link curl statically
    # Mirrors `[dist.dependencies.apt]` in dist-workspace.toml so the
    # CI workflow doesn't fail with cryptic "exit code 101" when those
    # build-time deps are missing on a fresh ubuntu-latest runner.
    - name: Install system build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libcurl4-openssl-dev
    - name: Build
      run: cargo build --workspace --verbose
    - name: Run tests
      run: cargo test --workspace --verbose
    # On pull_request: verify formatting and fail loudly if a
    # contributor forgot to run `cargo fmt` locally. On push to main:
    # apply formatting, and if anything changed, commit + push the
    # result back with a `[skip ci]` marker so this workflow doesn't
    # re-trigger itself. Same dual-mode shape as the man-page regen
    # step further down.
    - name: Verify formatting (PRs only)
      if: github.event_name == 'pull_request'
      run: cargo fmt -p manta-shared -p manta-cli -p manta-server -- --check
    - name: Apply and commit formatting (main only)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        cargo fmt -p manta-shared -p manta-cli -p manta-server
        if git diff --quiet; then
          echo "Formatting already in sync; nothing to commit."
          exit 0
        fi
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -u crates/
        git commit -m "style(ci): apply rustfmt [skip ci]"
        git push origin HEAD:main
    - name: Run clippy
      run: cargo clippy --workspace --no-deps -- -D warnings
    # Build rustdoc. Fails on undocumented public items in
    # `manta-shared` (the crate is `#![deny(missing_docs)]`), and on
    # any broken intra-doc link or invalid HTML across the workspace.
    # This catches doc rot the same way clippy catches code rot.
    - name: Build rustdoc
      env:
        RUSTDOCFLAGS: -D rustdoc::broken_intra_doc_links -D rustdoc::invalid_html_tags
      run: cargo doc --workspace --no-deps
    # Compile and run doctests (the `# Examples` blocks inside ///
    # comments). Plain `cargo test --workspace` does NOT run these.
    - name: Run doctests
      run: cargo test --doc --workspace
    - name: Enforce anyhow boundary
      run: |
        if grep -rn 'use anyhow' \
            crates/manta-server/src/server/ \
            crates/manta-server/src/service/ \
            crates/manta-server/src/backend_dispatcher/ \
            crates/manta-server/src/dispatcher.rs \
            crates/manta-server/src/config.rs \
            crates/manta-shared/src/common/ \
            2>/dev/null; then
          echo "ERROR: anyhow found outside crates/manta-cli/src/ — only the CLI may use anyhow"
          exit 1
        fi
    # Fail on known RustSec advisories against Cargo.lock. Cheap
    # insurance against landing a CVE-flagged dep. Ignored advisories
    # are documented in `.cargo/audit.toml`. Pinning the cargo-audit
    # version (rather than always-latest) matches the cargo-machete
    # step below; a new cargo-audit release could change behaviour or
    # the format of `.cargo/audit.toml`, and we'd rather find out
    # via an intentional version bump than a surprise CI failure.
    - name: Install cargo-audit
      run: cargo install cargo-audit --version 0.22.1 --locked
    - name: Run cargo audit
      run: cargo audit
    # Fail if any crate's Cargo.toml declares a dependency it never
    # uses. Catches dep-rot when source is removed but the manifest
    # entry survives. The workspace is currently clean; any addition
    # is a regression.
    - name: Install cargo-machete
      run: cargo install cargo-machete --version 0.9.2 --locked
    - name: Run cargo machete
      run: cargo machete
    # On pull_request: verify that the checked-in man pages and shell-
    # completion scripts are in sync with the current clap definition.
    # `build.rs` only regenerates them when MANTA_REGENERATE_DOCS=1 is
    # set, so a clap change a contributor forgot to regenerate would
    # otherwise ship stale docs. Fail loudly so the PR author knows to
    # run the regen + commit locally.
    - name: Verify generated docs are up to date (PRs only)
      if: github.event_name == 'pull_request'
      run: |
        MANTA_REGENERATE_DOCS=1 cargo build -p manta-cli
        if ! git diff --exit-code -- crates/manta-cli/man crates/manta-cli/autocomplete_shell_scripts; then
          echo "ERROR: man pages or shell completions are out of date."
          echo "Run 'MANTA_REGENERATE_DOCS=1 cargo build -p manta-cli' and commit the diff."
          exit 1
        fi
    # On push to main: regenerate, and if anything actually changed,
    # commit + push the result back. Without this, cargo-release's
    # version bumps leave manta.1's embedded version string stale on
    # every release until someone notices the next PR failing. The
    # `[skip ci]` marker on the auto-commit prevents this workflow
    # from re-triggering itself.
    - name: Regenerate and commit generated docs (main only)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        MANTA_REGENERATE_DOCS=1 cargo build -p manta-cli
        if git diff --quiet -- crates/manta-cli/man crates/manta-cli/autocomplete_shell_scripts; then
          echo "Generated docs already in sync; nothing to commit."
          exit 0
        fi
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add crates/manta-cli/man crates/manta-cli/autocomplete_shell_scripts
        git commit -m "chore(cli): regenerate man pages + shell completions [skip ci]"
        git push origin HEAD:main

  # Validate that both Dockerfiles still build and produce a runnable
  # binary. Runs in parallel with the cargo `build` job above (no
  # `needs:` dependency) so a Rust failure and a Docker failure both
  # surface in the same CI run instead of serialising.
  #
  # Layer caching via the GitHub Actions cache backend keeps the
  # incremental rebuild cost reasonable — without it every push would
  # re-run a full Rust workspace compile inside the image (~10 min
  # each). With it, an unchanged Dockerfile + Cargo.lock reuses every
  # layer.
  docker:
    name: docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    # packages: write is required by the GHCR push step on main; PRs
    # still run with read-only effective permissions because the login
    # + push steps are gated on `github.event_name == 'push'`.
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: cli
            dockerfile: crates/manta-cli/Dockerfile
          - image: server
            dockerfile: crates/manta-server/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      # Log in to GHCR only on push events. Fork PRs can't push to the
      # base repo's packages anyway, so we skip login and just build
      # locally for the smoke-test.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Compute image tags. On push to main this resolves to
      # `ghcr.io/eth-cscs/manta-<image>:main`. On PR it resolves to
      # nothing, which is fine — the PR build path uses its own local
      # `:ci` tag below.
      - name: Compute image metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/manta-${{ matrix.image }}
          tags: |
            type=ref,event=branch
      # PR path: build into the local docker daemon so we can smoke-
      # test below. No registry push.
      - name: Build image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: manta-${{ matrix.image }}:ci
          cache-from: type=gha,scope=manta-${{ matrix.image }}
          cache-to: type=gha,scope=manta-${{ matrix.image }},mode=max
      # Push path: emit straight to GHCR. The smoke-test below only
      # runs on PRs (where the image is loaded locally); we trust the
      # most-recent PR's smoke-test to have caught any runtime-lib
      # regression before merge.
      - name: Build and push image (main)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=manta-${{ matrix.image }}
          cache-to: type=gha,scope=manta-${{ matrix.image }},mode=max
      # Smoke-test: the binary inside the image must at least produce
      # `--help` without crashing. Catches missing runtime libs
      # (librdkafka1, ca-certificates, …) that wouldn't surface from a
      # successful `cargo build` step.
      - name: Smoke-test --help
        if: github.event_name == 'pull_request'
        run: docker run --rm manta-${{ matrix.image }}:ci --help
