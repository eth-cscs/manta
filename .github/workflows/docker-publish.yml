name: Publish container images

# Trigger glob mirrors release.yml so a single tag push produces both
# the GitHub Release (cargo-dist) and the GHCR container images.
# Kept in its own workflow because release.yml is autogenerated by
# `dist init` and would lose any local edits on regeneration.
on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    name: publish (${{ matrix.image }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: cli
            dockerfile: crates/manta-cli/Dockerfile
          - image: server
            dockerfile: crates/manta-server/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Tag strategy:
      #   stable tag (e.g. v2.0.0)         → :2.0.0, :2.0, :2, :latest
      #   prerelease (e.g. v2.0.0-beta.44) → :2.0.0-beta.44 only
      #
      # The tags are pre-computed in a shell step (instead of via
      # docker/metadata-action) so we can `echo` them and inspect the
      # value in the GHA logs. metadata-action previously produced
      # empty output on a release run here, which reached buildx with
      # no `--tag` flag and failed with "tag is needed when pushing
      # to registry"; the shell-based path is more transparent.
      #
      # Stable / pre-release split: a `-` anywhere in the ref name
      # marks it a semver prerelease (e.g. `-beta.44`). Stable tags
      # get the full ladder + `:latest`; prereleases only get the
      # exact version tag so `:latest` never moves to a beta.
      #
      # `${owner,,}` lowercases the owner because GHCR rejects
      # uppercase in image references.
      - name: Compute GHCR image tags
        id: imgtags
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner_lc}/manta-${{ matrix.image }}"
          ref="${GITHUB_REF_NAME}"
          # Strip leading `v` if present (e.g. `v2.0.0-beta.44` → `2.0.0-beta.44`).
          version="${ref#v}"

          tags="${image}:${version}"

          if [[ "${version}" != *-* ]]; then
            # Stable release: extract major and major.minor from the SemVer
            # x.y.z prefix, then add :latest. `||true` so a non-conforming
            # version doesn't fail the cut step.
            major="$(printf '%s' "${version}" | cut -d. -f1)"
            minor="$(printf '%s' "${version}" | cut -d. -f2)"
            tags="${tags}"$'\n'"${image}:${major}.${minor}"
            tags="${tags}"$'\n'"${image}:${major}"
            tags="${tags}"$'\n'"${image}:latest"
          fi

          echo "Computed image tags:"
          printf '  %s\n' "${tags}"
          {
            echo 'tags<<EOF'
            echo "${tags}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      # Reuses the same GHA cache scope as the CI docker job. The tag
      # commit is typically the same SHA as the last main push, so
      # cache hit rate should be ~100% and this job mostly just re-
      # tags + uploads.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.imgtags.outputs.tags }}
          cache-from: type=gha,scope=manta-${{ matrix.image }}
          cache-to: type=gha,scope=manta-${{ matrix.image }},mode=max
