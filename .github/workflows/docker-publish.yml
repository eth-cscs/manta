name: Publish container images

# Trigger glob mirrors release.yml so a single tag push produces both
# the GitHub Release (cargo-dist) and the GHCR container images.
# Kept in its own workflow because release.yml is autogenerated by
# `dist init` and would lose any local edits on regeneration.
on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    name: publish (${{ matrix.image }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: cli
            dockerfile: crates/manta-cli/Dockerfile
          - image: server
            dockerfile: crates/manta-server/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Tag strategy:
      #   stable tag (e.g. v2.0.0)        → :2.0.0, :2.0, :2, :latest
      #   prerelease (e.g. v2.0.0-beta.39) → :2.0.0-beta.39 only
      # The `latest` enable expression guards on the absence of a `-`
      # in the ref name (semver prerelease marker), matching cargo-
      # dist's prerelease detection.
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/manta-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      # Reuses the same GHA cache scope as the CI docker job. The tag
      # commit is typically the same SHA as the last main push, so
      # cache hit rate should be ~100% and this job mostly just re-
      # tags + uploads.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=manta-${{ matrix.image }}
          cache-to: type=gha,scope=manta-${{ matrix.image }},mode=max
