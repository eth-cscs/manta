[package]
name        = "manta-shared"
description = "Shared types and pure helpers used by both manta-cli and (future) manta-server."
publish     = false
version.workspace      = true
edition.workspace      = true
authors.workspace      = true
license-file.workspace = true
repository.workspace   = true

[lib]
path = "src/lib.rs"

[dependencies]
# Backend traits and shared types (Group, NodeSummary, K8sDetails, etc.)
# plus the structured `Error` type used by helpers throughout this crate.
# csm-rs is still needed for the NodeDetails re-export in shared/dto.rs
# (mirroring is the next decoupling step). ochami-rs is server-only now.
manta-backend-dispatcher = { workspace = true }
csm-rs                   = { workspace = true }

serde        = { workspace = true }
serde_json   = { workspace = true }
serde_yaml   = { workspace = true }
chrono       = { workspace = true }
utoipa       = { workspace = true }
minijinja    = { workspace = true }
strum        = { workspace = true }
strum_macros = { workspace = true }
tracing      = { workspace = true }
tracing-subscriber = { workspace = true }
tokio        = { workspace = true }
futures      = { workspace = true }

# common/* helpers: kafka, jwt_ops, config loader.
rdkafka            = { workspace = true }
base64             = { workspace = true }
config             = { workspace = true }
dialoguer          = { workspace = true }
directories        = { workspace = true }
toml               = { workspace = true }
toml_edit          = { workspace = true }
reqwest            = { workspace = true }
anyhow             = { workspace = true }
