[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# A GitHub repo to push Homebrew formulas to
tap = "eth-cscs/homebrew-tap"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# Whether to install an updater program
install-updater = false
# Bundling of manta-cli's committed man pages and shell completions
# into the release tarball is configured per-package under
# `crates/manta-cli/Cargo.toml`'s `[package.metadata.dist]` block.
# Keeping it there (instead of here at workspace level) is what
# stops the same files from also landing in the manta-server
# tarball under the unified-release setup. The build script
# regenerates them on `MANTA_REGENERATE_DOCS=1` and CI fails if a
# PR leaves them stale.

# 19-04-2026 - fix https://github.com/eth-cscs/manta/actions/runs/24638911170/job/72039269661 and https://github.com/eth-cscs/manta/actions/runs/24638911170/job/72039269657
[dist.dependencies.apt]
cmake = { stage = ["build", "run"], version = '*'}
libcurl4-openssl-dev = { stage = ["build", "run"], version = '*'}
